name: CI

on:
  push:
    branches:
      - main
      - develop
      - duy-khai
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  backend-test:
    name: Backend Maven Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run backend tests
        working-directory: backend
        run: mvn test

  web-build:
    name: Web TypeScript Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm -w @ebike/web run build

  docker-build:
    name: Backend Docker Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - backend-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build backend Docker image
        working-directory: backend
        run: docker build -t ebike-backend:ci .
