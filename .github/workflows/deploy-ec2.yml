name: Deploy Backend to EC2

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy with Docker Compose
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_SSH_PORT: ${{ secrets.EC2_SSH_PORT || 22 }}
      EC2_BACKEND_ENV_FILE: ${{ secrets.EC2_BACKEND_ENV_FILE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate deployment secrets
        run: |
          test -n "$EC2_HOST" || (echo "Missing EC2_HOST" && exit 1)
          test -n "$EC2_USER" || (echo "Missing EC2_USER" && exit 1)
          test -n "${{ secrets.EC2_SSH_KEY }}" || (echo "Missing EC2_SSH_KEY" && exit 1)
          test -n "$EC2_BACKEND_ENV_FILE" || (echo "Missing EC2_BACKEND_ENV_FILE" && exit 1)

      - name: Create deployment archive
        run: |
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='backend/target' \
            --exclude='packages/web/dist' \
            --exclude='packages/mobile/node_modules' \
            --exclude='packages/desktop/node_modules' \
            --exclude='packages/shared-code/node_modules' \
            -czf /tmp/ebike-deploy.tar.gz .

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -p "$EC2_SSH_PORT" -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Upload source and environment file
        run: |
          printf "%s" "$EC2_BACKEND_ENV_FILE" > /tmp/ebike-backend.env
          chmod 600 /tmp/ebike-backend.env
          scp -i ~/.ssh/ec2_key -P "$EC2_SSH_PORT" /tmp/ebike-deploy.tar.gz "$EC2_USER@$EC2_HOST:/tmp/ebike-deploy.tar.gz"
          scp -i ~/.ssh/ec2_key -P "$EC2_SSH_PORT" /tmp/ebike-backend.env "$EC2_USER@$EC2_HOST:/tmp/ebike-backend.env"

      - name: Start backend on EC2
        run: |
          ssh -i ~/.ssh/ec2_key -p "$EC2_SSH_PORT" "$EC2_USER@$EC2_HOST" <<'EOF'
          set -e
          APP_DIR="$HOME/e-bike-multiplatform"
          mkdir -p "$APP_DIR"
          tar -xzf /tmp/ebike-deploy.tar.gz -C "$APP_DIR"
          mv /tmp/ebike-backend.env "$APP_DIR/backend/.env"
          chmod 600 "$APP_DIR/backend/.env"
          cd "$APP_DIR/backend"
          docker compose -f docker-compose.ec2.yml up -d postgres redis

          echo "Dong bo password PostgreSQL theo backend/.env..."
          docker compose -f docker-compose.ec2.yml exec -T postgres sh -lc 'psql -U "$POSTGRES_USER" -d "$POSTGRES_DB" -v ON_ERROR_STOP=1 -v db_user="$POSTGRES_USER" -v db_password="$POSTGRES_PASSWORD" -c "ALTER USER :\"db_user\" WITH PASSWORD :'\''db_password'\'';"'

          docker compose -f docker-compose.ec2.yml up -d --build backend
          docker compose -f docker-compose.ec2.yml ps
          
          echo "Dang doi 40 giay de Spring Boot khoi dong..."
          sleep 40
          
          docker exec ebike-backend curl -f http://localhost:8080/api/v1/health/ready
          EOF
