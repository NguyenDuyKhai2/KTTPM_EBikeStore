name: Deploy Backend to EC2

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy with Docker Compose
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_SSH_PORT: ${{ secrets.EC2_SSH_PORT || 22 }}
      EC2_BACKEND_ENV_FILE: ${{ secrets.EC2_BACKEND_ENV_FILE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate deployment secrets
        run: |
          test -n "$EC2_HOST" || (echo "Missing EC2_HOST" && exit 1)
          test -n "$EC2_USER" || (echo "Missing EC2_USER" && exit 1)
          test -n "${{ secrets.EC2_SSH_KEY }}" || (echo "Missing EC2_SSH_KEY" && exit 1)
          test -n "$EC2_BACKEND_ENV_FILE" || (echo "Missing EC2_BACKEND_ENV_FILE" && exit 1)

      - name: Create deployment archive
        run: |
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='backend/target' \
            --exclude='packages/web/dist' \
            --exclude='packages/mobile/node_modules' \
            --exclude='packages/desktop/node_modules' \
            --exclude='packages/shared-code/node_modules' \
            -czf /tmp/ebike-deploy.tar.gz .

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keyscan -p "$EC2_SSH_PORT" -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Upload source and environment file
        run: |
          printf "%s" "$EC2_BACKEND_ENV_FILE" > /tmp/ebike-backend.env
          chmod 600 /tmp/ebike-backend.env
          scp -i ~/.ssh/ec2_key -P "$EC2_SSH_PORT" /tmp/ebike-deploy.tar.gz "$EC2_USER@$EC2_HOST:/tmp/ebike-deploy.tar.gz"
          scp -i ~/.ssh/ec2_key -P "$EC2_SSH_PORT" /tmp/ebike-backend.env "$EC2_USER@$EC2_HOST:/tmp/ebike-backend.env"

      - name: Start backend on EC2
        run: |
          ssh -i ~/.ssh/ec2_key -p "$EC2_SSH_PORT" "$EC2_USER@$EC2_HOST" <<'EOF'
          set -e
          APP_DIR="$HOME/e-bike-multiplatform"
          mkdir -p "$APP_DIR"
          tar -xzf /tmp/ebike-deploy.tar.gz -C "$APP_DIR"
          mv /tmp/ebike-backend.env "$APP_DIR/backend/.env"
          chmod 600 "$APP_DIR/backend/.env"
          cd "$APP_DIR/backend"
          docker compose -f docker-compose.ec2.yml up -d postgres redis

          DEPLOY_POSTGRES_USER="$(awk -F= '$1 == "POSTGRES_USER" {sub(/^[^=]*=/, ""); sub(/\r$/, ""); print; exit}' .env)"
          DEPLOY_POSTGRES_PASSWORD="$(awk -F= '$1 == "POSTGRES_PASSWORD" {sub(/^[^=]*=/, ""); sub(/\r$/, ""); print; exit}' .env)"
          DEPLOY_POSTGRES_DB="$(awk -F= '$1 == "POSTGRES_DB" {sub(/^[^=]*=/, ""); sub(/\r$/, ""); print; exit}' .env)"

          echo "Doi PostgreSQL khoi tao xong..."
          for i in $(seq 1 60); do
            POSTGRES_HEALTH="$(docker inspect -f '{{.State.Health.Status}}' ebike-postgres 2>/dev/null || echo starting)"
            if [ "$POSTGRES_HEALTH" = "healthy" ]; then
              break
            fi

            if [ "$i" -eq 60 ]; then
              echo "PostgreSQL chua healthy sau 120 giay. Log gan nhat:"
              docker logs --tail 120 ebike-postgres
              exit 1
            fi

            sleep 2
          done

          echo "Dong bo user/password/database PostgreSQL theo backend/.env..."
          docker compose -f docker-compose.ec2.yml exec -T \
            -e DEPLOY_POSTGRES_USER="$DEPLOY_POSTGRES_USER" \
            -e DEPLOY_POSTGRES_PASSWORD="$DEPLOY_POSTGRES_PASSWORD" \
            -e DEPLOY_POSTGRES_DB="$DEPLOY_POSTGRES_DB" \
            postgres sh -lc "
          set -e
          ADMIN_USER=
          for candidate in postgres \"\$POSTGRES_USER\" \"\$DEPLOY_POSTGRES_USER\" ebike_prod_user ebike_user; do
            if psql -U \"\$candidate\" -d postgres -tAc \"SELECT 1\" >/dev/null 2>&1; then
              ADMIN_USER=\"\$candidate\"
              break
            fi
          done

          if [ -z \"\$ADMIN_USER\" ]; then
            echo \"Khong tim thay PostgreSQL admin role trong volume hien tai.\"
            echo \"Hay SSH vao EC2 va chay: docker exec ebike-postgres psql -U <role-cu> -d postgres -c '\\du'\"
            echo \"Neu khong can giu du lieu DB, xoa volume postgres_data roi deploy lai.\"
            exit 1
          fi

          psql -U \"\$ADMIN_USER\" -d postgres -v ON_ERROR_STOP=1 \
            -v db_user=\"\$DEPLOY_POSTGRES_USER\" \
            -v db_password=\"\$DEPLOY_POSTGRES_PASSWORD\" \
            -v db_name=\"\$DEPLOY_POSTGRES_DB\" <<'SQL'
          SELECT CASE
            WHEN EXISTS (SELECT 1 FROM pg_roles WHERE rolname = :'db_user')
            THEN format('ALTER ROLE %I WITH LOGIN PASSWORD %L', :'db_user', :'db_password')
            ELSE format('CREATE ROLE %I WITH LOGIN PASSWORD %L', :'db_user', :'db_password')
          END
          \gexec

          SELECT format('CREATE DATABASE %I OWNER %I', :'db_name', :'db_user')
          WHERE NOT EXISTS (SELECT 1 FROM pg_database WHERE datname = :'db_name')
          \gexec

          SELECT format('ALTER DATABASE %I OWNER TO %I', :'db_name', :'db_user')
          \gexec
          SQL

          psql -U \"\$ADMIN_USER\" -d \"\$DEPLOY_POSTGRES_DB\" -v ON_ERROR_STOP=1 \
            -v db_user=\"\$DEPLOY_POSTGRES_USER\" <<'SQL'
          SELECT format('ALTER SCHEMA public OWNER TO %I', :'db_user')
          \gexec

          SELECT format('GRANT ALL ON SCHEMA public TO %I', :'db_user')
          \gexec

          SELECT format('GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO %I', :'db_user')
          \gexec

          SELECT format('GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO %I', :'db_user')
          \gexec
          SQL
          "

          docker compose -f docker-compose.ec2.yml up -d --build --force-recreate backend
          docker compose -f docker-compose.ec2.yml ps
          
          echo "Dang doi 40 giay de Spring Boot khoi dong..."
          sleep 40
          
          docker exec ebike-backend curl -f http://localhost:8080/api/v1/health/ready
          EOF
