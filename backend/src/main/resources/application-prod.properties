spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

logging.level.com.ebike=INFO

server.forward-headers-strategy=framework
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/plain,text/css,application/javascript
server.compression.min-response-size=1024
server.tomcat.threads.max=${SERVER_TOMCAT_THREADS_MAX:200}
server.tomcat.threads.min-spare=${SERVER_TOMCAT_THREADS_MIN_SPARE:20}
server.tomcat.accept-count=${SERVER_TOMCAT_ACCEPT_COUNT:100}
server.tomcat.max-connections=${SERVER_TOMCAT_MAX_CONNECTIONS:8192}

spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:20}
spring.datasource.hikari.minimum-idle=${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:5}
spring.datasource.hikari.connection-timeout=${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:30000}
spring.datasource.hikari.idle-timeout=${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT:600000}
spring.datasource.hikari.max-lifetime=${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:1800000}

app.instance-id=${APP_INSTANCE_ID:${HOSTNAME:local}}
