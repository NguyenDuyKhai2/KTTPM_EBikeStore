spring.application.name=ebike-backend
spring.profiles.default=dev

server.port=8080
server.servlet.context-path=/api/v1

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.flyway.ignore-migration-patterns=*:missing

# JWT Configuration
jwt.secret=your-super-secret-jwt-key-change-this-in-production-with-a-secure-random-key-at-least-32-characters
jwt.expiration=86400000

# Auth cookie/CORS configuration
app.auth.cookie.secure=false
app.auth.cookie.same-site=Lax
app.cors.allowed-origin-patterns=http://localhost:3000,http://localhost:5173,http://localhost:5174,http://localhost:5175,http://127.0.0.1:3000,http://127.0.0.1:5173,http://127.0.0.1:5174,http://127.0.0.1:5175
app.rate-limit.enabled=${APP_RATE_LIMIT_ENABLED:true}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

spring.cache.type=${SPRING_CACHE_TYPE:redis}
spring.cache.redis.time-to-live=${SPRING_CACHE_REDIS_TIME_TO_LIVE:1800000}
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:${SPRING_REDIS_HOST:${REDIS_HOST:localhost}}}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:${SPRING_REDIS_PORT:${REDIS_PORT:6379}}}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:${SPRING_REDIS_PASSWORD:${REDIS_PASSWORD:}}}
spring.data.redis.timeout=${SPRING_DATA_REDIS_TIMEOUT:${SPRING_REDIS_TIMEOUT:2000ms}}

app.storage.s3.bucket=${APP_STORAGE_S3_BUCKET:kinetic-s3-bucket}
app.storage.s3.region=${APP_STORAGE_S3_REGION:ap-southeast-1}
app.storage.s3.public-base-url=${APP_STORAGE_S3_PUBLIC_BASE_URL:}
app.storage.s3.product-image-prefix=${APP_STORAGE_S3_PRODUCT_IMAGE_PREFIX:products}

vnpay.tmn-code=${VNPAY_TMN_CODE:}
vnpay.hash-secret=${VNPAY_HASH_SECRET:}
vnpay.pay-url=${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
vnpay.return-url=${VNPAY_RETURN_URL:http://localhost:5173/payment/return}
vnpay.ipn-url=${VNPAY_IPN_URL:http://localhost:8080/api/v1/payments/vnpay/ipn}

app.order.email-otp.mail-enabled=${ORDER_EMAIL_OTP_MAIL_ENABLED:true}
app.order.email-otp.from=${ORDER_EMAIL_OTP_FROM:no-reply@ebike.local}
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER:}
spring.mail.password=${SMTP_PASS:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS_ENABLE:true}

app.ai.gemini.enabled=${GEMINI_AI_ENABLED:true}
app.ai.gemini.api-key=${GEMINI_AI_KEY:}
app.ai.gemini.model=${GEMINI_AI_MODEL:gemini-2.5-flash}
app.ai.pdf-knowledge.enabled=${PDF_KNOWLEDGE_ENABLED:true}
app.ai.pdf-knowledge.location-pattern=${PDF_KNOWLEDGE_LOCATION_PATTERN:classpath*:docs/*.pdf}
app.ai.pdf-knowledge.max-results=${PDF_KNOWLEDGE_MAX_RESULTS:3}
app.ai.pdf-knowledge.chunk-size=${PDF_KNOWLEDGE_CHUNK_SIZE:900}
app.ai.pdf-knowledge.chunk-overlap=${PDF_KNOWLEDGE_CHUNK_OVERLAP:120}
app.ai.pdf-knowledge.min-score=${PDF_KNOWLEDGE_MIN_SCORE:2.0}
