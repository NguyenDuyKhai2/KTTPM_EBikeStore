version: '3.8'

services:
  # =====================================================
  # PostgreSQL Database
  # =====================================================
  postgres:
    image: postgres:16-alpine
    container_name: ebike-postgres
    environment:
      POSTGRES_USER: ebike_user
      POSTGRES_PASSWORD: ebike_password_123
      POSTGRES_DB: ebike_db
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      # Mount SQL init scripts
      - ./sql-init:/docker-entrypoint-initdb.d
      # Persist PostgreSQL data
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ebike-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ebike_user -d ebike_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c log_statement=all
      -c log_duration=on
      -c max_connections=200

  # =====================================================
  # Redis Cache
  # =====================================================
  redis:
    image: redis:7-alpine
    container_name: ebike-redis
    environment:
      REDIS_PASSWORD: redis_password_123
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - ebike-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_password_123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass redis_password_123

  # =====================================================
  # Spring Boot Backend
  # =====================================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
        - VCS_REF=$(git rev-parse --short HEAD)
        - VERSION=1.0.0
    container_name: ebike-backend
    environment:
      # ========== Database ==========
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ebike_db
      SPRING_DATASOURCE_USERNAME: ebike_user
      SPRING_DATASOURCE_PASSWORD: ebike_password_123
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 20
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: 5
      
      # ========== JPA/Hibernate ==========
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQL14Dialect
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL: "true"
      
      # ========== Flyway ==========
      SPRING_FLYWAY_ENABLED: "true"
      SPRING_FLYWAY_LOCATIONS: classpath:db/migration
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
      SPRING_FLYWAY_VALIDATE_ON_MIGRATE: "false"
      
      # ========== Redis Cache ==========
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: redis_password_123
      SPRING_REDIS_TIMEOUT: 2000
      SPRING_CACHE_TYPE: redis
      SPRING_CACHE_REDIS_TIME_TO_LIVE: 3600000
      
      # ========== Application ==========
      SERVER_PORT: 8080
      SERVER_SERVLET_CONTEXT_PATH: /api/v1
      SERVER_COMPRESSION_ENABLED: "true"
      
      # ========== JWT Security ==========
      APP_JWT_SECRET: your-secret-key-here-minimum-256-bits-required-for-security
      APP_JWT_EXPIRATION: 86400000
      APP_JWT_REFRESH_EXPIRATION: 604800000
      
      # ========== Logging ==========
      LOGGING_LEVEL_ROOT: INFO
      LOGGING_LEVEL_COM_EBIKE: DEBUG
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY: DEBUG
      LOGGING_PATTERN_CONSOLE: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"
      
      # ========== ML Models Path ==========
      ML_MODELS_PATH: /app/ml-models
      BERT_MODEL_PATH: /app/ml-models/intent-classifier.pkl
      NER_MODEL_PATH: /app/ml-models/entity-extractor.pkl
      
      # ========== Environment ==========
      SPRING_PROFILES_ACTIVE: dev
      ENVIRONMENT: development
    
    ports:
      - "8080:8080"
      - "5005:5005"
    
    volumes:
      - ./src:/app/src
      - ./pom.xml:/app/pom.xml
      - ./src/main/resources/ml-models:/app/ml-models:ro
      - ./src/main/resources/faq-data:/app/faq-data:ro
      - ./logs:/app/logs
    
    networks:
      - ebike-network
    
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    restart: unless-stopped
    
    stdin_open: true
    tty: true

# =====================================================
# Volumes
# =====================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# =====================================================
# Networks
# =====================================================
networks:
  ebike-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
