services:
  postgres:
    image: postgres:16-alpine
    container_name: ebike-postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ebike_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ebike_password_123}
      POSTGRES_DB: ${POSTGRES_DB:-ebike_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ebike-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ebike_user} -d ${POSTGRES_DB:-ebike_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ebike-redis
    env_file:
      - .env
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password_123}
    volumes:
      - redis_data:/data
    networks:
      - ebike-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_password_123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ebike-backend
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ebike_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-ebike_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-ebike_password_123}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_password_123}
      SPRING_CACHE_TYPE: redis
      APP_INSTANCE_ID: ec2-backend-1
    ports:
      - "${BACKEND_PUBLIC_PORT:-8080}:8080"
    volumes:
      - backend_logs:/app/logs
    networks:
      - ebike-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/health/ready"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  backend_logs:

networks:
  ebike-network:
    driver: bridge
